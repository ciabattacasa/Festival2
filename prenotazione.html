<nav>

<section>

<h2>🎟️ Prenotazione biglietti</h2>

<form action="process.php" method="post">

<p><strong>Prezzo:</strong> 25€ al giorno (20€ al giorno selezionando più giorni)</p>

<input type="text" name="telefono" placeholder="Telefono" required><br>
<input type="email" name="email" placeholder="Email" required><br><br>

<div style="text-align: center; margin-bottom: 20px; align-items: center;">
    <p><strong>Scegli i giorni:</strong></p>

    <style>
        .selection-verticale {
            display: inline-block; 
            text-align: left;      
            margin: 0 auto;
        }

        .selection-verticale label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .selection-verticale input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 15px; 
            cursor: pointer;
            flex-shrink: 0;     
        }
    </style>
</div>

    <div class="selection-verticale">
        <label><input type="checkbox" name="giorni[]" value="Venerdì"> Venerdì</label>
        <label><input type="checkbox" name="giorni[]" value="Sabato"> Sabato</label>
        <label><input type="checkbox" name="giorni[]" value="Domenica"> Domenica</label>
    </div>
</div>
<br>
<br>
<label>Numero biglietti:</label><br>
<input type="number" id="quantita" name="quantita" value="1" min="1"><br><br>
<p><strong>Totale:</strong> <span id="totale">0</span> €</p>

<div id="persone"></div>

<br>
<button type="submit">Acquista</button>

</form>

</section>

<script>
const quantita = document.getElementById("quantita");
const personeDiv = document.getElementById("persone");
const totaleSpan = document.getElementById("totale");
const checkboxes = document.querySelectorAll("input[name='giorni[]']");

function generaCampi() {
    let n = quantita.value;
    personeDiv.innerHTML = "";

    for (let i = 1; i <= n; i++) {
        personeDiv.innerHTML += `
            <h4>Persona ${i}</h4>
            <input type="text" name="nome[]" placeholder="Nome" required><br>
            <input type="text" name="cognome[]" placeholder="Cognome" required><br><br>
        `;
    }

    calcolaTotale();
}

function calcolaTotale() {
    let giorniSelezionati = document.querySelectorAll("input[name='giorni[]']:checked").length;
    let q = parseInt(quantita.value);

    if (giorniSelezionati === 0) {
        totaleSpan.innerText = 0;
        return;
    }

    let prezzo = (giorniSelezionati === 1) ? 25 : 20;

    let totale = prezzo * giorniSelezionati * q;

    totaleSpan.innerText = totale;
}

// eventi
quantita.addEventListener("input", generaCampi);
checkboxes.forEach(cb => cb.addEventListener("change", calcolaTotale));

window.onload = generaCampi;
</script>

</body>
</html>
